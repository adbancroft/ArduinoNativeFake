[env:native]
platform = native
test_build_src = yes
build_flags = -std=c++11
debug_test = *
build_type = debug
lib_deps = 
    https://github.com/adbancroft/ArduinoFake#speeduino
    
[env:Win32]
platform = windows_x86
test_build_src = yes
build_flags = -std=c++11 -Wno-attributes
debug_test = *
build_type = debug
lib_deps = 
    https://github.com/adbancroft/ArduinoFake#speeduino